start_zones:
  name: Start zones
  description: Start mowing on a specified list of zones in the given order.
  fields:
    device_id:
      name: Device
      description: The Lymow mower to command.
      required: true
      selector:
        device:
          integration: lymow_mqtt
    zones:
      name: Zones
      description: |
        Ordered list of zones to mow. Each entry can be either a zone
        NAME (case-insensitive, as configured in the Lymow app — e.g.
        "Pool", "Front yard") OR an 8-character hashId. The mower mows
        them in the given order. Discover zone names by inspecting the
        `available_zones` attribute on `sensor.<mower>_current_zone`.
      required: true
      example: ["Pool", "Front yard"]
      selector:
        object:

dock_cancel_task:
  name: Dock and abandon task
  description: |
    Send the mower home AND abandon any in-progress task. Destructive —
    task progress is reset and cannot be resumed.
    For preserve-task docking, use the standard Dock action on the
    lawn_mower entity, which sends RECHARGE_DOCK.
  fields:
    device_id:
      name: Device
      description: The Lymow mower to command.
      required: true
      selector:
        device:
          integration: lymow_mqtt

cancel_task:
  name: Cancel task (force reinit)
  description: |
    Force the mower to reset to WAITING state. Stops in place — does NOT
    drive home. Use when stuck in error and the regular Pause/Resume
    can't recover.
  fields:
    device_id:
      name: Device
      description: The Lymow mower to command.
      required: true
      selector:
        device:
          integration: lymow_mqtt
